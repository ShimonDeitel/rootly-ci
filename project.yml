name: Rootly
options:
  bundleIdPrefix: com.shimondeitel.rootly
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Rootly:
    type: application
    platform: iOS
    sources:
      - path: Rootly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rootly
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Rootly/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RootlyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RootlyTests
      - path: Rootly.storekit
    dependencies:
      - target: Rootly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rootly.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RootlyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RootlyUITests
    dependencies:
      - target: Rootly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rootly.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Rootly:
    build:
      targets:
        Rootly: all
        RootlyTests: [test]
        RootlyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Rootly.storekit
    test:
      config: Debug
      storeKitConfiguration: Rootly.storekit
      targets:
        - RootlyTests
        - RootlyUITests
    archive:
      config: Release
